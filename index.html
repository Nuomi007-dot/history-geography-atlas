<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>历史地理交互地图 · Historical Geography Atlas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
<style>
:root {
  --bg: #1a1a2e;
  --panel-bg: #16213e;
  --accent: #e8a850;
  --accent2: #4ecdc4;
  --accent3: #ff6b6b;
  --text: #e0e0e0;
  --text-dim: #8892a4;
  --border: #2a3a5c;
  --slider-track: #2a3a5c;
  --slider-fill: #e8a850;
  --china: #c62828;
  --europe: #1565c0;
  --middle-east: #2e7d32;
  --wars: #6a1b9a;
  --rome: #c41e3a;
  --mongol: #d4a017;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 16px;
  background: var(--panel-bg);
  border-bottom: 1px solid var(--border);
  z-index: 1000;
  flex-shrink: 0;
}
.header h1 {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.header h1 span { color: var(--accent); }
.header .controls {
  display: flex;
  gap: 8px;
  align-items: center;
}
.year-display {
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
  min-width: 90px;
  text-align: center;
}
.btn {
  padding: 5px 12px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.05);
  color: var(--text);
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s;
}
.btn:hover { background: rgba(255,255,255,0.12); border-color: var(--accent); }
.btn.active { background: var(--accent); color: #1a1a2e; border-color: var(--accent); font-weight: 600; }
.btn-sm { padding: 3px 8px; font-size: 11px; }

/* Main Layout */
.main-container {
  display: flex;
  flex: 1;
  min-height: 0;
  position: relative;
}

/* Map */
.map-wrapper {
  flex: 1;
  position: relative;
  min-width: 0;
}
#map {
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* Map toolbar overlay */
.map-toolbar {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.map-toolbar .btn {
  width: 34px;
  height: 34px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  border-radius: 4px;
}

/* Time indicator overlay on map */
.time-indicator {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  background: rgba(22,33,62,0.9);
  backdrop-filter: blur(8px);
  padding: 6px 18px;
  border-radius: 20px;
  border: 1px solid var(--border);
  font-size: 14px;
  font-weight: 600;
  pointer-events: none;
}

/* Bottom Panel */
.bottom-panel {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  background: var(--panel-bg);
  display: flex;
  flex-direction: column;
}

/* Timeline Panel */
.timeline-panel {
  padding: 8px 24px 0;
  position: relative;
}

.timeline-slider-container {
  position: relative;
  height: 48px;
  display: flex;
  align-items: center;
}

#timeline-slider {
  -webkit-appearance: none;
  width: 100%;
  height: 6px;
  background: var(--slider-track);
  border-radius: 3px;
  outline: none;
  cursor: pointer;
}
#timeline-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 28px;
  background: var(--accent);
  border-radius: 4px;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(232,168,80,0.5);
  border: 2px solid #fff;
}
#timeline-slider::-moz-range-thumb {
  width: 18px;
  height: 28px;
  background: var(--accent);
  border-radius: 4px;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(232,168,80,0.5);
  border: 2px solid #fff;
}

/* Scale marks */
.scale-marks {
  position: relative;
  height: 20px;
  margin-top: 2px;
}
.scale-mark {
  position: absolute;
  transform: translateX(-50%);
  font-size: 9px;
  color: var(--text-dim);
  cursor: pointer;
  white-space: nowrap;
}
.scale-mark::before {
  content: '';
  display: block;
  width: 1px;
  height: 6px;
  background: var(--text-dim);
  margin: 0 auto 1px;
}
.scale-mark.major {
  font-size: 10px;
  color: var(--text);
  font-weight: 600;
}
.scale-mark.major::before {
  height: 10px;
  background: var(--accent);
  width: 2px;
}

/* Parallel Tracks */
.tracks-panel {
  padding: 4px 24px 8px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.track-row {
  display: flex;
  align-items: center;
  height: 20px;
  gap: 8px;
}
.track-label {
  font-size: 10px;
  color: var(--text-dim);
  white-space: nowrap;
  min-width: 80px;
  text-align: right;
  font-weight: 600;
}
.track-bar {
  flex: 1;
  height: 14px;
  position: relative;
  border-radius: 7px;
  overflow: hidden;
  background: rgba(255,255,255,0.03);
}
.track-segment {
  position: absolute;
  height: 100%;
  border-radius: 2px;
  cursor: pointer;
  transition: filter 0.15s;
}
.track-segment:hover {
  filter: brightness(1.4);
  z-index: 2;
}
.track-cursor {
  position: absolute;
  top: -2px;
  width: 2px;
  height: 18px;
  background: #fff;
  z-index: 10;
  pointer-events: none;
  box-shadow: 0 0 6px rgba(255,255,255,0.4);
}

/* Track colors */
.tc-world { background: linear-gradient(90deg, #607d8b, #78909c, #90a4ae, #b0bec5); }
.tc-china { background: linear-gradient(90deg, #b71c1c, #c62828, #d32f2f, #e53935, #ef5350); }
.tc-europe { background: linear-gradient(90deg, #0d47a1, #1565c0, #1976d2, #1e88e5, #42a5f5); }
.tc-mideast { background: linear-gradient(90deg, #1b5e20, #2e7d32, #388e3c, #43a047, #66bb6a); }
.tc-wars { background: linear-gradient(90deg, #4a148c, #6a1b9a, #7b1fa2, #8e24aa, #ab47bc); }

/* Notes Panel */
.notes-panel {
  height: 200px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: relative;
}
.notes-toolbar {
  display: flex;
  gap: 4px;
  padding: 4px 12px;
  background: rgba(0,0,0,0.3);
  align-items: center;
  border-bottom: 1px solid var(--border);
}
.notes-toolbar .btn { font-size: 12px; }
.color-picker {
  width: 28px;
  height: 28px;
  border: 2px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  padding: 0;
  background: none;
}
.color-picker::-webkit-color-swatch-wrapper { padding: 0; }
.color-picker::-webkit-color-swatch { border: none; border-radius: 2px; }
.brush-size {
  width: 60px;
  font-size: 11px;
}
.separator {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 4px;
}
#notesCanvas {
  flex: 1;
  cursor: crosshair;
  background: #faf9f5;
  border-radius: 0;
}
#notesCanvas.eraser { cursor: cell; }

/* Marker popup custom */
.leaflet-popup-content-wrapper {
  background: var(--panel-bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.leaflet-popup-tip { background: var(--panel-bg); }
.marker-popup h3 {
  font-size: 15px;
  margin-bottom: 6px;
  color: var(--accent);
}
.marker-popup img {
  max-width: 240px;
  border-radius: 4px;
  margin: 4px 0;
}
.marker-popup .note {
  font-size: 13px;
  color: var(--text);
  line-height: 1.6;
}
.marker-popup .quote {
  font-size: 12px;
  font-style: italic;
  color: var(--accent2);
  border-left: 2px solid var(--accent);
  padding-left: 8px;
  margin: 6px 0;
  line-height: 1.5;
}
}
.marker-popup a {
  color: var(--accent2);
  font-size: 12px;
}

/* Legend for boundaries */
.boundary-legend { display: none; } /* removed, replaced by marker list */

/* Marker list panel */
.add-marker-panel {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2000;
  background: var(--panel-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  display: none;
  min-width: 280px;
}
.add-marker-panel.show { display: block; }
.add-marker-panel h3 { font-size: 14px; margin-bottom: 10px; color: var(--accent); }
.add-marker-panel input,
.add-marker-panel textarea {
  width: 100%;
  padding: 6px 8px;
  margin-bottom: 8px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 4px;
  font-size: 12px;
}
.add-marker-panel textarea { height: 60px; resize: vertical; }
.add-marker-panel .btn-row { display: flex; gap: 6px; justify-content: flex-end; margin-top: 8px; }

/* Overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1999;
  display: none;
}
.overlay.show { display: block; }

/* Collapse system */

/* Marker list panel */
.marker-list-panel {
  position: absolute;
  top: 60px;
  left: 10px;
  z-index: 1000;
  background: rgba(22,33,62,0.92);
  backdrop-filter: blur(8px);
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  width: 240px;
  max-height: 55vh;
  display: flex;
  flex-direction: column;
  transition: all 0.25s ease;
}
.marker-list-panel.collapsed {
  width: 36px;
  height: 36px;
  min-width: 36px;
  overflow: hidden;
  padding: 4px;
  border-radius: 50%;
}
.marker-list-panel h4 {
  font-size: 12px;
  margin: 0 0 6px 0;
  color: var(--accent);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.marker-list-panel.collapsed h4,
.marker-list-panel.collapsed .marker-list-scroll { display: none; }
.marker-list-panel .toggle-btn {
  width: 18px;
  height: 18px;
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 12px;
  border-radius: 3px;
  flex-shrink: 0;
}
.marker-list-panel .toggle-btn:hover { color: var(--text); background: rgba(255,255,255,0.1); }
.marker-list-panel.collapsed .toggle-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 16px;
}
.marker-list-scroll {
  overflow-y: auto;
  flex: 1;
  min-height: 0;
}
.marker-list-scroll::-webkit-scrollbar { width: 4px; }
.marker-list-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.marker-list-item {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  padding: 4px 4px;
  cursor: pointer;
  border-radius: 4px;
  font-size: 11px;
  line-height: 1.35;
  transition: background 0.1s;
}
.marker-list-item:hover { background: rgba(255,255,255,0.08); }
.marker-list-item .ml-year {
  font-weight: 700;
  color: var(--accent);
  min-width: 48px;
  flex-shrink: 0;
  font-size: 10px;
  text-align: right;
}
.marker-list-item .ml-text { flex: 1; min-width: 0; }
.marker-list-item .ml-title { color: var(--text); }
.marker-list-item .ml-source { color: var(--text-dim); font-size: 9px; }

/* Bottom panel collapse */
.bottom-panel { transition: all 0.25s ease; overflow: hidden; }
.bottom-toggle-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 22px;
  background: rgba(0,0,0,0.3);
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  font-size: 11px;
  color: var(--text-dim);
  gap: 6px;
  transition: background 0.15s;
  user-select: none;
}
.bottom-toggle-bar:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.bottom-toggle-bar .arrow { transition: transform 0.25s; font-size: 10px; }
.bottom-panel.collapsed .bottom-toggle-bar .arrow { transform: rotate(180deg); }
.bottom-panel.collapsed .timeline-panel,
.bottom-panel.collapsed .tracks-panel,
.bottom-panel.collapsed .notes-panel { display: none; }
.bottom-panel.collapsed { min-height: auto; }

/* Mini timeline for collapsed mode */
.mini-timeline {
  display: none;
  padding: 6px 24px;
  background: rgba(0,0,0,0.2);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.bottom-panel.collapsed .mini-timeline { display: flex; align-items: center; gap: 10px; }
.mini-timeline .mini-year { font-size: 13px; font-weight: 700; color: var(--accent); min-width: 70px; }
.mini-timeline input { flex: 1; }

/* Header collapse buttons */
.collapse-btns { display: flex; gap: 0; margin-left: 4px; }
.collapse-btns .btn {
  border-radius: 0;
  font-size: 11px;
  padding: 4px 8px;
}
.collapse-btns .btn:first-child { border-radius: 4px 0 0 4px; }
.collapse-btns .btn:last-child { border-radius: 0 4px 4px 0; }
.collapse-btns .btn.collapsed { opacity: 0.5; background: rgba(255,255,255,0.03); }

/* Responsive */
@media (max-width: 768px) {
  .header h1 { font-size: 13px; }
  .year-display { font-size: 16px; min-width: 60px; }
  .notes-panel { height: 150px; }
  .collapse-btns { display: none; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>🌍 <span>历史地理</span>交互地图 · Historical Geography Atlas</h1>
  <div class="controls">
    <span style="font-size:11px;color:var(--text-dim)">当前年份:</span>
    <button class="btn btn-sm" onclick="fineTuneYear(-1)" title="上年">◀</button>
    <span class="year-display" id="yearDisplay">2025 CE</span>
    <button class="btn btn-sm" onclick="fineTuneYear(1)" title="下年">▶</button>
    <input type="number" id="yearInput" style="width:60px;padding:3px 5px;background:rgba(255,255,255,0.08);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:12px;" placeholder="年份" onkeydown="if(event.key==='Enter')jumpToYear()">
    <button class="btn btn-sm" onclick="jumpToYear()">跳转</button>
    <button class="btn btn-sm" onclick="goToPresent()" title="回到现代">📍 现在</button>
    <button class="btn btn-sm" id="btnDraw" onclick="toggleDraw()">✏️ 地图作画</button>
    <button class="btn btn-sm" onclick="toggleAddMarker()">📌 添加标记</button>
    <select id="tileSelect" onchange="changeTileLayer()" style="padding:4px 6px;background:rgba(255,255,255,0.08);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:11px;">
      <option value="satellite">卫星图</option>
      <option value="terrain">地形图</option>
      <option value="street">街道图</option>
    </select>
    <span class="collapse-btns">
      <button class="btn btn-sm" id="btnCollapseMarkerList" onclick="toggleMarkerList()" title="折叠/展开剧情标记列表">📌 标记</button>
      <button class="btn btn-sm" id="btnCollapseBottom" onclick="toggleBottomPanel()" title="折叠/展开底部面板">⬇ 底部</button>
      <button class="btn btn-sm" onclick="exportAllData()" title="导出所有数据">📤 导出</button>
      <button class="btn btn-sm" onclick="importAllData()" title="从文件导入数据">📥 导入</button>
    </span>
  </div>
</div>

<!-- Main -->
<div class="main-container">
  <div class="map-wrapper">
    <div id="map"></div>
    <div class="time-indicator" id="timeIndicator">2025 CE</div>
    <div class="map-toolbar">
      <button class="btn" onclick="mapZoomIn()" title="放大">+</button>
      <button class="btn" onclick="mapZoomOut()" title="缩小">−</button>
      <button class="btn" onclick="mapFitWorld()" title="世界视图">⊡</button>
    </div>
    <!-- Marker list panel -->
    <div class="marker-list-panel" id="markerListPanel">
      <button class="toggle-btn" onclick="toggleMarkerList()" title="折叠/展开">◀</button>
      <h4>📌 剧情标记 <span style="font-size:10px;color:var(--text-dim)" id="markerCount"></span></h4>
      <div class="marker-list-scroll" id="markerListScroll"></div>
    </div>
  </div>
</div>

<!-- Bottom Panel -->
<div class="bottom-panel" id="bottomPanel">
  <div class="bottom-toggle-bar" onclick="toggleBottomPanel()" title="折叠/展开底部面板">
    <span>📋 时间轴 & 笔记</span>
    <span class="arrow">▲</span>
  </div>
  <!-- Mini timeline (shown when collapsed) -->
  <div class="mini-timeline">
    <span class="mini-year" id="miniYear">2025 CE</span>
    <input type="range" id="mini-timeline-slider" min="0" max="10000" value="10000" step="1" oninput="onMiniSliderInput()">
    <button class="btn btn-sm" onclick="goToPresent()">📍</button>
  </div>
  <!-- Timeline -->
  <div class="timeline-panel">
    <div class="timeline-slider-container">
      <input type="range" id="timeline-slider" min="0" max="10000" value="10000" step="1">
    </div>
    <div class="scale-marks" id="scaleMarks"></div>
  </div>

  <!-- Parallel Tracks -->
  <div class="tracks-panel">
    <div class="track-row">
      <span class="track-label">🌐 世界历史</span>
      <div class="track-bar" id="trackWorld"><div class="track-cursor"></div></div>
    </div>
    <div class="track-row">
      <span class="track-label">🇨🇳 中国历史</span>
      <div class="track-bar" id="trackChina"><div class="track-cursor"></div></div>
    </div>
    <div class="track-row">
      <span class="track-label">🏛️ 欧洲/西方</span>
      <div class="track-bar" id="trackEurope"><div class="track-cursor"></div></div>
    </div>
    <div class="track-row">
      <span class="track-label">🕌 中东历史</span>
      <div class="track-bar" id="trackMideast"><div class="track-cursor"></div></div>
    </div>
    <div class="track-row">
      <span class="track-label">⚔️ 重大战争</span>
      <div class="track-bar" id="trackWars"><div class="track-cursor"></div></div>
    </div>
  </div>

  <!-- Notes Panel -->
  <div class="notes-panel">
    <div class="notes-toolbar">
      <button class="btn btn-sm active" id="toolPen" onclick="setNotesTool('pen')">🖊️ 画笔</button>
      <button class="btn btn-sm" id="toolEraser" onclick="setNotesTool('eraser')">🧹 橡皮</button>
      <button class="btn btn-sm" id="toolText" onclick="setNotesTool('text')">T 文字</button>
      <input type="color" class="color-picker" id="notesColor" value="#1a1a2e" onchange="updateBrushColor()">
      <input type="range" id="brushSize" class="brush-size" min="1" max="20" value="3" oninput="updateBrushSize()">
      <span style="font-size:10px;color:var(--text-dim)" id="brushSizeLabel">3px</span>
      <span class="separator"></span>
      <button class="btn btn-sm" onclick="insertImage()">🖼️ 插图</button>
      <button class="btn btn-sm" onclick="insertLink()">🔗 插链接</button>
      <button class="btn btn-sm" onclick="clearNotes()">🗑️ 清空</button>
      <span style="margin-left:auto;font-size:10px;color:var(--text-dim)">笔记随当前时间点变化</span>
    </div>
    <canvas id="notesCanvas"></canvas>
  </div>
</div>

<!-- Add Marker Dialog -->
<div class="overlay" id="overlay" onclick="toggleAddMarker()"></div>
<div class="add-marker-panel" id="addMarkerPanel">
  <h3>📌 在地图上添加标记</h3>
  <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;">先在地图上点击选择位置，然后填写信息</div>
  <input type="text" id="markerTitle" placeholder="标题（如：罗马斗兽场）">
  <input type="text" id="markerImage" placeholder="图片链接 URL（漫画截图等）">
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">
    <label style="font-size:11px;color:var(--text-dim);white-space:nowrap;">📷 图片基地址</label>
    <input type="text" id="imgBaseUrl" placeholder="raw.githubusercontent.com/...comics/" value="https://raw.githubusercontent.com/Nuomi007-dot/history-geography-atlas/master/comics/" style="flex:1;font-size:12px;padding:6px;" oninput="localStorage.setItem('history_map_img_base', this.value.trim())">
    <a href="https://github.com/Nuomi007-dot/history-geography-atlas/upload/master/comics" target="_blank" title="打开 GitHub 上传漫画截图" style="font-size:11px;color:var(--accent);text-decoration:none;white-space:nowrap;">📤 上传</a>

function createMarkers() {
  sampleMarkers.forEach(m => {
    addMarkerToMap(m);
  });
}

function addMarkerToMap(data) {
  const marker = L.marker([data.lat, data.lng], {
    opacity: 0,
    riseOnHover: true,
  });
  
  const startYearBCE = data.startYear < 0 ? `${Math.abs(data.startYear)} BCE` : `${data.startYear} CE`;
  const endYearStr = data.endYear >= YEAR_MAX ? '至今' : (data.endYear < 0 ? `${Math.abs(data.endYear)} BCE` : `${data.endYear} CE`);
  
  marker.bindPopup(`
    <div class="marker-popup">
      <h3>${data.title}</h3>
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:4px;">${startYearBCE} — ${endYearStr}</div>
      ${data.image ? `<img src="${data.image}" alt="${data.title}" onerror="this.style.display='none'" loading="lazy">` : ''}
      <div class="note">${data.note || ''}</div>
      ${data.quote ? `<div class="quote">${data.quote}</div>` : ''}
      ${data.link ? `<a href="${data.link}" target="_blank" rel="noopener">${data.link.includes('mubu.com') ? '📒 打开幕布笔记 →' : data.link.includes('weread') ? '📖 微信读书 →' : '🔗 了解更多 →'}</a>` : ''}
    </div>
  `, { maxWidth: 350, className: 'marker-popup-container' });
  
  marker._timeData = data;
  marker._id = 'marker_' + Date.now() + '_' + Math.random();
  
  if (!data._container) {
    data._container = marker;
  }
  
  return marker;
}

function filterMarkersByYear(year) {
  sampleMarkers.forEach(m => {
    if (m._container) {
      const marker = m._container;
      if (year >= m.startYear && year <= m.endYear) {
        if (!map.hasLayer(marker)) {
          marker.addTo(map);
          marker.setOpacity(1);
        }
      } else {
        if (map.hasLayer(marker)) {
          map.removeLayer(marker);
        }
      }
    }
  });
}

const slider = document.getElementById('timeline-slider');

function yearToSliderVal(year) {
  return ((year - YEAR_MIN) / YEAR_SPAN) * 10000;
}

function sliderValToYear(val) {
  return Math.round(YEAR_MIN + (val / 10000) * YEAR_SPAN);
}

function formatYear(year) {
  if (year < 0) return `${Math.abs(year)} BCE`;
  if (year === 0) return '1 CE';
  return `${year} CE`;
}

function updateYear(year) {
  currentYear = year;
  document.getElementById('yearDisplay').textContent = formatYear(year);
  document.getElementById('timeIndicator').textContent = formatYear(year);
  
  // Update markers
  filterMarkersByYear(year);
  
  // Update track cursors
  updateTrackCursors(year);
  
  // Update notes canvas
  loadNotesForYear(year);
  
  // Update slider if not being dragged
  if (!slider.matches(':active')) {
    slider.value = yearToSliderVal(year);
  }
  // Sync mini timeline
  syncMiniTimeline(year);
}

slider.addEventListener('input', () => {
  const year = sliderValToYear(parseInt(slider.value));
  updateYear(year);
});

// Keyboard controls
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
    if (e.target.id === 'yearInput') return; // allow input in year field
  }
  const step = e.shiftKey ? 100 : (e.ctrlKey ? 10 : 1);
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    currentYear = Math.min(YEAR_MAX, currentYear + step);
    updateYear(currentYear);
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    currentYear = Math.max(YEAR_MIN, currentYear - step);
    updateYear(currentYear);
  }
});

    segments.forEach(seg => {
      const left = yearToSliderVal(seg.start) / 100;
      const width = (yearToSliderVal(seg.end) - yearToSliderVal(seg.start)) / 100;
      
      const div = document.createElement('div');
      div.className = 'track-segment ' + seg.cls;
      div.style.left = left + '%';
      div.style.width = Math.max(width, 0.3) + '%';
      div.title = `${seg.label} (${formatYear(seg.start)} — ${formatYear(seg.end)})`;
      div.onclick = () => {
        currentYear = Math.round((seg.start + seg.end) / 2);
        updateYear(currentYear);
      };
      bar.appendChild(div);
    });
  });

const notesCanvas = document.getElementById('notesCanvas');
const notesCtx = notesCanvas.getContext('2d');
let isDrawing = false;
let notesBrushColor = '#1a1a2e';
let notesBrushSize = 3;
let notesHistory = {}; // year -> ImageData

function resizeNotesCanvas() {
  const rect = notesCanvas.parentElement.getBoundingClientRect();
  notesCanvas.width = rect.width;
  notesCanvas.height = rect.height - 
    notesCanvas.parentElement.querySelector('.notes-toolbar').getBoundingClientRect().height;
  notesCtx.fillStyle = '#faf9f5';
  notesCtx.fillRect(0, 0, notesCanvas.width, notesCanvas.height);
  
  // Restore current year's notes
  if (notesHistory[currentYear]) {
    const img = new Image();
    img.onload = () => notesCtx.drawImage(img, 0, 0);
    img.src = notesHistory[currentYear];
  }
}

function saveNotesForYear(year) {
  notesHistory[year] = notesCanvas.toDataURL();
  // Throttled localStorage save for notes
  if (!saveNotesForYear._timeout) {
    saveNotesForYear._timeout = setTimeout(() => {
      saveNotesForYear._timeout = null;
      saveDataToStorage();
    }, 2000);
  }
}

function loadNotesForYear(year) {
  notesCtx.fillStyle = '#faf9f5';
  notesCtx.fillRect(0, 0, notesCanvas.width, notesCanvas.height);
  
  if (notesHistory[year]) {
    const img = new Image();
    img.onload = () => notesCtx.drawImage(img, 0, 0);
    img.src = notesHistory[year];
  }
  
  // Show year label on canvas
  notesCtx.fillStyle = 'rgba(0,0,0,0.08)';
  notesCtx.font = 'bold 48px "Segoe UI", sans-serif';
  notesCtx.textAlign = 'right';
  notesCtx.fillText(formatYear(year), notesCanvas.width - 16, notesCanvas.height - 12);
  notesCtx.textAlign = 'start';
}

function getCanvasPos(e) {
  const rect = notesCanvas.getBoundingClientRect();
  const scaleX = notesCanvas.width / rect.width;
  const scaleY = notesCanvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY,
  };
}

notesCanvas.addEventListener('mousedown', (e) => {
  if (notesTool === 'text') {
    const pos = getCanvasPos(e);
    addTextAtPosition(pos.x, pos.y);
    return;
  }
  isDrawing = true;
  const pos = getCanvasPos(e);
  notesCtx.beginPath();
  notesCtx.moveTo(pos.x, pos.y);
  notesCtx.strokeStyle = notesTool === 'eraser' ? '#faf9f5' : notesBrushColor;
  notesCtx.lineWidth = notesTool === 'eraser' ? notesBrushSize * 3 : notesBrushSize;
  notesCtx.lineCap = 'round';
  notesCtx.lineJoin = 'round';
});

notesCanvas.addEventListener('mousemove', (e) => {
  if (!isDrawing && notesTool !== 'text') return;
  if (notesTool === 'text') return;
  const pos = getCanvasPos(e);
  notesCtx.lineTo(pos.x, pos.y);
  notesCtx.stroke();
});

notesCanvas.addEventListener('mouseup', () => {
  if (isDrawing) {
    isDrawing = false;
    notesCtx.closePath();
    saveNotesForYear(currentYear);
  }
});

notesCanvas.addEventListener('mouseleave', () => {
  if (isDrawing) {
    isDrawing = false;
    notesCtx.closePath();
    saveNotesForYear(currentYear);
  }
});

// Touch support
notesCanvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (notesTool === 'text') return;
  isDrawing = true;
  const touch = e.touches[0];
  const pos = getCanvasPos(touch);
  notesCtx.beginPath();
  notesCtx.moveTo(pos.x, pos.y);
  notesCtx.strokeStyle = notesTool === 'eraser' ? '#faf9f5' : notesBrushColor;
  notesCtx.lineWidth = notesTool === 'eraser' ? notesBrushSize * 3 : notesBrushSize;
  notesCtx.lineCap = 'round';
  notesCtx.lineJoin = 'round';
});

notesCanvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!isDrawing) return;
  const touch = e.touches[0];
  const pos = getCanvasPos(touch);
  notesCtx.lineTo(pos.x, pos.y);
  notesCtx.stroke();
});

notesCanvas.addEventListener('touchend', () => {
  if (isDrawing) {
    isDrawing = false;
    notesCtx.closePath();
    saveNotesForYear(currentYear);
  }
});

function setNotesTool(tool) {
  notesTool = tool;
  document.querySelectorAll('.notes-toolbar .btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tool' + tool.charAt(0).toUpperCase() + tool.slice(1)).classList.add('active');
  notesCanvas.className = tool === 'eraser' ? 'eraser' : '';
}

function updateBrushColor() {
  notesBrushColor = document.getElementById('notesColor').value;
}

function updateBrushSize() {
  notesBrushSize = parseInt(document.getElementById('brushSize').value);
  document.getElementById('brushSizeLabel').textContent = notesBrushSize + 'px';
}

function addTextAtPosition(x, y) {
  const text = prompt('输入文字:', '');
  if (!text) return;
  notesCtx.fillStyle = notesBrushColor;
  notesCtx.font = `${notesBrushSize * 5}px "Segoe UI", sans-serif`;
  notesCtx.fillText(text, x, y);
  saveNotesForYear(currentYear);
}

function insertImage() {
  const url = prompt('输入图片链接 URL:', '');
  if (!url) return;
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    const x = notesCanvas.width / 2 - img.width / 4;
    const y = notesCanvas.height / 2 - img.height / 4;
    notesCtx.drawImage(img, x, y, img.width / 2, img.height / 2);
    saveNotesForYear(currentYear);
  };
  img.onerror = () => {
    // Try drawing a placeholder
    const x = notesCanvas.width / 2 - 100;
    const y = notesCanvas.height / 2 - 60;
    notesCtx.fillStyle = '#e0e0e0';
    notesCtx.fillRect(x, y, 200, 120);
    notesCtx.fillStyle = '#666';
    notesCtx.font = '12px "Segoe UI", sans-serif';
    notesCtx.textAlign = 'center';
    notesCtx.fillText('图片加载失败', x + 100, y + 55);
    notesCtx.fillText(url, x + 100, y + 75);
    notesCtx.textAlign = 'start';
    saveNotesForYear(currentYear);
  };
  img.src = url;
}

function insertLink() {
  const url = prompt('输入链接 URL:', 'https://');
  if (!url) return;
  const label = prompt('链接显示文字:', url);
  notesCtx.fillStyle = '#1565c0';
  notesCtx.font = `italic ${notesBrushSize * 5}px "Segoe UI", sans-serif`;
  notesCtx.fillText(`🔗 ${label || url}`, 20, notesCanvas.height / 2);
  // Store link data for click handling
  if (!notesCanvas._links) notesCanvas._links = {};
  if (!notesCanvas._links[currentYear]) notesCanvas._links[currentYear] = [];
  notesCanvas._links[currentYear].push({
    x: 20, y: notesCanvas.height / 2 - 15,
    w: notesCtx.measureText(`🔗 ${label || url}`).width,
    h: notesBrushSize * 5 + 5,
    url: url,
    label: label || url
  });
  saveNotesForYear(currentYear);
}

notesCanvas.addEventListener('click', (e) => {
  if (notesTool !== 'pen' && notesTool !== 'eraser') return;
  const pos = getCanvasPos(e);
  // Check if clicked on a link
  if (notesCanvas._links && notesCanvas._links[currentYear]) {
    for (const link of notesCanvas._links[currentYear]) {
      if (pos.x >= link.x && pos.x <= link.x + link.w && 
          pos.y >= link.y && pos.y <= link.y + link.h) {
        window.open(link.url, '_blank');
        return;
      }
    }
  }
});

function clearNotes() {
  if (!confirm('确定清空当前时间点的所有笔记？')) return;
  notesCtx.fillStyle = '#faf9f5';
  notesCtx.fillRect(0, 0, notesCanvas.width, notesCanvas.height);
  delete notesHistory[currentYear];
  if (notesCanvas._links) delete notesCanvas._links[currentYear];
}

function buildMarkerList() {
  const container = document.getElementById('markerListScroll');
  const countEl = document.getElementById('markerCount');
  
  // Sort markers by startYear
  const sorted = [...sampleMarkers].sort((a, b) => a.startYear - b.startYear);
  
  countEl.textContent = `(${sorted.length})`;
  
  sorted.forEach((m, idx) => {
    const realIdx = sampleMarkers.indexOf(m);
    const div = document.createElement('div');
    div.className = 'marker-list-item';
    div.title = m.note || '';
    
    const yearStr = m.startYear < 0 ? `${Math.abs(m.startYear)}BC` : `${m.startYear}CE`;
    
    // Determine source
    let source = '';
    if (m.title.includes('龙族') || m.title.includes('白帝城') || m.title.includes('三峡') || 
        m.title.includes('珍珠港') || m.title.includes('通古斯') || m.title.includes('阪神') ||
        m.title.includes('蒲公英') || m.title.includes('亚历山大东征') || m.title.includes('柏林') ||
        m.title.includes('阿根廷') || m.title.includes('赫尔佐格') || m.title.includes('汉高') ||
        m.title.includes('卡塞尔') || m.title.includes('芝加哥') || m.title.includes('北京') ||
        m.title.includes('东京') || m.title.includes('西伯利亚') || m.title.includes('富士山') ||
        m.title.includes('北极')) {
      source = '龙族';
    } else if (m.title.includes('寻找前世之旅') || m.title.includes('底比斯') || m.title.includes('咸阳宫') ||
               m.title.includes('特洛伊') || m.title.includes('平安京') || m.title.includes('巴比伦') ||
               m.title.includes('克诺索斯') || m.title.includes('佛罗伦萨') || m.title.includes('特诺奇蒂特兰') ||
               m.title.includes('凡尔赛') || m.title.includes('临安') || m.title.includes('长安城')) {
      source = '寻找前世之旅';
    } else {
      source = '史实';
    }
    
    div.innerHTML = `
      <span class="ml-year">${yearStr}</span>
      <span class="ml-text" style="flex:1;min-width:0">
        <span class="ml-title">${m.title}</span>
        <span class="ml-source">[${source}]</span>
      </span>
      <button class="btn btn-sm" style="padding:1px 5px;font-size:10px;flex-shrink:0;opacity:0.5" onclick="event.stopPropagation();editMarker(${realIdx})" title="编辑标记">✏️</button>
    `;
    
    div.onclick = (e) => {
      if (e.target.tagName === 'BUTTON') return;
      currentYear = m.startYear;
      updateYear(currentYear);
      if (m._container) {
        const latlng = m._container.getLatLng();
        map.setView(latlng, Math.max(map.getZoom(), 5));
        m._container.openPopup();
      }
    };
    
    container.appendChild(div);
  });
}

function editMarker(idx) {
  const m = sampleMarkers[idx];
  if (!m) return;
  editingMarkerIndex = idx;
  const panel = document.getElementById('addMarkerPanel');
  const overlay = document.getElementById('overlay');
  panel.classList.add('show');
  overlay.classList.add('show');
  pendingMarkerLatLng = { lat: m.lat, lng: m.lng };
  document.getElementById('markerTitle').value = m.title || '';
  document.getElementById('markerImage').value = m.image || '';
  document.getElementById('markerLink').value = m.link || '';
  document.getElementById('markerNote').value = m.note || '';
  document.getElementById('markerQuote').value = m.quote || '';
  document.getElementById('markerStartYear').value = m.startYear;
  document.getElementById('markerEndYear').value = m.endYear;
  panel.querySelector('h3').textContent = '✏️ 编辑标记';
  panel.querySelector('div').textContent = '修改信息后点击保存';
}

// 通用基地址解析：完整URL原样返回；裸名称自动拼上对应基地址
function resolveWithBase(raw, baseId) {
  raw = (raw || '').trim();
  if (!raw) return '';
  if (/^https?:\/\//i.test(raw)) return raw;
  const el = document.getElementById(baseId);
  let base = (el ? el.value : '').trim();
  if (!base) return raw;
  if (!/^https?:\/\//i.test(base)) base = 'https://' + base;
  return base.replace(/\/+$/, '') + '/' + raw.replace(/^\/+/, '');
}

function saveMarker() {
  const title = document.getElementById('markerTitle').value.trim();
  const image = resolveWithBase(document.getElementById('markerImage').value, 'imgBaseUrl');
  const link = resolveWithBase(document.getElementById('markerLink').value, 'noteBaseUrl');
  const note = document.getElementById('markerNote').value.trim();
  const quote = document.getElementById('markerQuote').value.trim();
  const startYear = parseInt(document.getElementById('markerStartYear').value);
  const endYear = parseInt(document.getElementById('markerEndYear').value);

  if (!title) { alert('请输入标题'); return; }
  if (isNaN(startYear) || isNaN(endYear)) { alert('请输入有效的年份'); return; }

  if (editingMarkerIndex >= 0) {
    // Edit existing marker
    const m = sampleMarkers[editingMarkerIndex];
    m.title = title;
    m.image = image;
    m.link = link;
    m.note = note;
    m.quote = quote;
    m.startYear = startYear;
    m.endYear = endYear;
    if (pendingMarkerLatLng) {
      m.lat = pendingMarkerLatLng.lat;
      m.lng = pendingMarkerLatLng.lng;
    }
    // Update map marker
    if (m._container) {
      if (map.hasLayer(m._container)) map.removeLayer(m._container);
    }
    const newMarker = addMarkerToMap(m);
    m._container = newMarker;
    if (currentYear >= startYear && currentYear <= endYear) {
      newMarker.addTo(map);
      newMarker.setOpacity(1);
    }
    toggleAddMarker();
    saveDataToStorage();
    console.log('Marker updated:', m.title);
  } else {
    // Add new marker
    if (!pendingMarkerLatLng) { alert('请先在地图上点击选择位置'); return; }
    const newMarker = {
      title, image, link, note, quote,
      lat: pendingMarkerLatLng.lat,
      lng: pendingMarkerLatLng.lng,
      startYear, endYear,
    };
    markerData.push(newMarker);
    sampleMarkers.push(newMarker);
    const marker = addMarkerToMap(newMarker);
    newMarker._container = marker;
    if (currentYear >= startYear && currentYear <= endYear) {
      marker.addTo(map);
      marker.setOpacity(1);
    }
    toggleAddMarker();
    saveDataToStorage();
    console.log('Marker saved:', newMarker);
  }
  // Rebuild marker list
  document.getElementById('markerListScroll').innerHTML = '';
  buildMarkerList();
}

// ============================================================
// LOCAL STORAGE PERSISTENCE
// ============================================================
function saveDataToStorage() {
  try {
    // Save custom markers (excluding sample ones - save only those without Wikipedia images)
    const customMarkers = markerData.map(m => ({
      title: m.title, lat: m.lat, lng: m.lng,
      startYear: m.startYear, endYear: m.endYear,
      image: m.image, link: m.link, note: m.note
    }));
    localStorage.setItem('history_map_markers', JSON.stringify(customMarkers));
    
    // Save notes (canvas images as base64)
    const notesToSave = {};
    Object.entries(notesHistory).forEach(([year, dataUrl]) => {
      notesToSave[year] = dataUrl;
    });
    localStorage.setItem('history_map_notes', JSON.stringify(notesToSave));
    
    // Save drawn items on map (bounding boxes)
    const drawnData = [];
    drawnItems.eachLayer(layer => {
      if (layer.toGeoJSON) {
        drawnData.push(layer.toGeoJSON());
      }
    });
    localStorage.setItem('history_map_drawings', JSON.stringify(drawnData));
    
    console.log('💾 数据已保存到 localStorage');
  } catch(e) {
    console.warn('⚠️ localStorage 保存失败:', e.message);
  }
}

function loadDataFromStorage() {
  try {
    // Load custom markers
    const savedMarkers = JSON.parse(localStorage.getItem('history_map_markers') || '[]');
    savedMarkers.forEach(m => {
      // Check if already exists
      const exists = sampleMarkers.some(sm => sm.title === m.title && sm.lat === m.lat);
      if (!exists) {
        sampleMarkers.push(m);
        const marker = addMarkerToMap(m);
        m._container = marker;
        markerData.push(m);
        if (currentYear >= m.startYear && currentYear <= m.endYear) {
          marker.addTo(map);
          marker.setOpacity(1);
        }
      }
    });
    
    // Load notes
    const savedNotes = JSON.parse(localStorage.getItem('history_map_notes') || '{}');
    Object.entries(savedNotes).forEach(([year, dataUrl]) => {
      notesHistory[parseInt(year)] = dataUrl;
    });
    
    // Load drawings
    const savedDrawings = JSON.parse(localStorage.getItem('history_map_drawings') || '[]');
    savedDrawings.forEach(geo => {
      L.geoJSON(geo, {
        style: () => ({ color: geo.properties?.color || '#ff6b6b', weight: 2 })
      }).addTo(drawnItems);
    });
    
    console.log('📂 已从 localStorage 加载数据');
    
    // Load 笔记基地址 (default to 幕布)
    const nb = localStorage.getItem('history_map_note_base');
    const nbInput = document.getElementById('noteBaseUrl');
    if (nbInput) nbInput.value = (nb !== null && nb !== '') ? nb : 'https://mubu.com/doc/';
    
    // Load 图片基地址 (default to GitHub comics folder)
    const ib = localStorage.getItem('history_map_img_base');
    const ibInput = document.getElementById('imgBaseUrl');
    if (ibInput) ibInput.value = (ib !== null && ib !== '') ? ib : 'https://raw.githubusercontent.com/Nuomi007-dot/history-geography-atlas/master/comics/';
  } catch(e) {
    console.warn('⚠️ localStorage 加载失败:', e.message);
  }
}

// Export all data as JSON file
function exportAllData() {
  const exportData = {
    markers: markerData.map(m => ({
      title: m.title, lat: m.lat, lng: m.lng,
      startYear: m.startYear, endYear: m.endYear,
      image: m.image, link: m.link, note: m.note
    })),
    notes: notesHistory,
    drawings: (() => {
      const data = [];
      drawnItems.eachLayer(layer => {
        if (layer.toGeoJSON) data.push(layer.toGeoJSON());
      });
      return data;
    })(),
    exportTime: new Date().toISOString(),
  };
  
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `history-map-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  console.log('📤 数据已导出');
}

// Import data from JSON file
function importAllData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const importData = JSON.parse(ev.target.result);
        if (confirm(`确认导入？\n- ${(importData.markers||[]).length} 个标记\n- ${Object.keys(importData.notes||{}).length} 个时间点笔记\n- ${(importData.drawings||[]).length} 个地图绘画\n\n导入会覆盖当前数据。`)) {
          // Clear existing custom markers
          markerData.forEach(m => {
            if (m._container && map.hasLayer(m._container)) map.removeLayer(m._container);
          });
          markerData = [];
          
          // Import markers
          (importData.markers || []).forEach(m => {
            markerData.push(m);
            sampleMarkers.push(m);
            const marker = addMarkerToMap(m);
            m._container = marker;
          });
          
          // Import notes
          notesHistory = {};
          Object.entries(importData.notes || {}).forEach(([year, dataUrl]) => {
            notesHistory[parseInt(year)] = dataUrl;
          });
          
          // Import drawings
          drawnItems.clearLayers();
          (importData.drawings || []).forEach(geo => {
            L.geoJSON(geo, { style: () => ({ color: geo.properties?.color || '#ff6b6b', weight: 2 }) }).addTo(drawnItems);
          });
          
          saveDataToStorage();
          updateYear(currentYear);
          loadNotesForYear(currentYear);
          alert('✅ 导入成功！');
        }
      } catch(err) {
        alert('❌ 导入失败：文件格式错误');
        console.error(err);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}
